<div class="container">
    <h1>{{ isEditMode() ? 'Edit Post' : 'Create New Post' }}</h1>

    <form (ngSubmit)="onSubmit()" #postForm="ngForm">
      <div class="form-group">
        <label for="title">Title *</label>
        <input
          type="text"
          id="title"
          name="title"
          [(ngModel)]="post.title"
          required
          #title="ngModel"
          class="form-control"
          [disabled]="isSubmitting()"
        />
        @if (title.invalid && title.touched) {
          <div class="error">
            Title is required
          </div>
        }
      </div>

      <div class="form-group">
        <label for="author">Author *</label>
        <input
          type="text"
          id="author"
          name="author"
          [(ngModel)]="post.author"
          required
          #author="ngModel"
          class="form-control"
          [disabled]="isSubmitting()"
        />
        @if (author.invalid && author.touched) {
          <div class="error">
            Author is required
          </div>
        }
      </div>

      <div class="form-group">
        <label for="content">Content *</label>
        <textarea
          id="content"
          name="content"
          [(ngModel)]="post.content"
          required
          #content="ngModel"
          rows="10"
          class="form-control"
          [disabled]="isSubmitting()"
        ></textarea>
        @if (content.invalid && content.touched) {
          <div class="error">
            Content is required
          </div>
        }
      </div>

      <div class="form-actions">
        <button type="submit" [disabled]="postForm.invalid || isSubmitting()" class="btn-submit">
          @if (!isSubmitting()) {
            <span>{{ isEditMode() ? 'Update' : 'Create' }} Post</span>
          }
          @if (isSubmitting()) {
            <span>Saving...</span>
          }
        </button>
        <button type="button" (click)="cancel()" class="btn-cancel" [disabled]="isSubmitting()">
          Cancel
        </button>
      </div>
    </form>
  </div>
